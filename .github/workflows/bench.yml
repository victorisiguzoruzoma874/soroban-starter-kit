name: Benchmarks / Gas Regression

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bench:
    name: Run criterion benchmarks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks (save baseline)
        # --save-baseline stores results under target/criterion so we can
        # compare on subsequent runs.  On PRs we compare against the stored
        # main baseline; on pushes to main we update it.
        run: |
          cargo bench --package contract-benchmarks -- \
            --save-baseline ci_baseline 2>&1 | tee bench_output.txt

      - name: Parse benchmark results to JSON
        shell: bash
        run: |
          python3 - <<'EOF'
          import re, json

          with open("bench_output.txt") as f:
              text = f.read()

          results = {}
          multipliers = {"ns": 1, "µs": 1_000, "ms": 1_000_000, "s": 1_000_000_000}
          # Capture the lower-bound value from: name  time: [lower estimate upper]
          pattern = r'^(.+?)\s+time:\s+\[\s*([\d.]+)\s*(ns|µs|ms|s)'
          for m in re.finditer(pattern, text, re.MULTILINE):
              name = m.group(1).strip()
              value, unit = float(m.group(2)), m.group(3)
              results[name] = value * multipliers[unit]

          with open("bench_results.json", "w") as f:
              json.dump(results, f, indent=2)
          print(f"Parsed {len(results)} benchmark results")
          EOF

      # ── Baseline storage (main branch only) ───────────────────────────────
      - name: Upload baseline artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline
          path: bench_results.json
          retention-days: 90

      # ── PR regression check ───────────────────────────────────────────────
      - name: Download baseline from main
        if: github.event_name == 'pull_request'
        id: download_baseline
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: bench.yml
          branch: main
          name: bench-baseline
          path: baseline
        continue-on-error: true

      - name: Compare benchmarks against baseline (10% threshold)
        if: github.event_name == 'pull_request'
        id: regression_check
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, os, sys

          baseline_path = "baseline/bench_results.json"
          if not os.path.exists(baseline_path):
              msg = "## Benchmark Regression Report\n\n> No baseline available yet. A baseline will be stored once a build completes on `main`."
              print(msg)
              with open("regression_report.md", "w") as f:
                  f.write(msg)
              sys.exit(0)

          with open(baseline_path) as f:
              baseline = json.load(f)
          with open("bench_results.json") as f:
              current = json.load(f)

          THRESHOLD = 0.10
          failures = []
          rows = []

          for name in sorted(set(list(baseline.keys()) + list(current.keys()))):
              base_ns = baseline.get(name)
              curr_ns = current.get(name)
              if base_ns is None:
                  rows.append(f"| `{name}` | — | {curr_ns:.0f} ns | new |")
              elif curr_ns is None:
                  rows.append(f"| `{name}` | {base_ns:.0f} ns | — | missing |")
              else:
                  change = (curr_ns - base_ns) / base_ns
                  icon = "OK" if change <= THRESHOLD else "FAIL"
                  rows.append(f"| `{name}` | {base_ns:.0f} ns | {curr_ns:.0f} ns | [{icon}] {change:+.1%} |")
                  if change > THRESHOLD:
                      failures.append(f"`{name}` ({change:+.1%})")

          table = "\n".join(rows)
          if failures:
              summary = f"\n\n**Regressions exceed 10% threshold:** {', '.join(failures)}"
          else:
              summary = "\n\nAll benchmarks within acceptable range."

          report = (
              "## Benchmark Regression Report\n\n"
              "| Benchmark | Baseline | Current | Change |\n"
              "|-----------|----------|---------|--------|\n"
              f"{table}{summary}"
          )

          with open("regression_report.md", "w") as f:
              f.write(report)
          print(report)

          if failures:
              print(f"\nFailing CI due to regressions: {', '.join(failures)}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Post regression report as PR comment
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('regression_report.md')) return;
            const body = fs.readFileSync('regression_report.md', 'utf8');
            const marker = '## Benchmark Regression Report';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Threshold check ────────────────────────────────────────────────────
      # Criterion prints "time: [lower  estimate  upper]" lines.
      # The script below fails the job if any single operation exceeds the
      # defined nanosecond threshold.  Adjust thresholds as the contracts evolve.
      - name: Check gas regression thresholds
        shell: bash
        run: |
          python3 - <<'EOF'
          import re, sys

          # Maximum allowed wall-clock time per operation (nanoseconds).
          # These are intentionally generous; tighten them as you establish baselines.
          THRESHOLDS = {
              "escrow::initialize":       5_000_000,
              "escrow::fund":             5_000_000,
              "escrow::approve_delivery": 5_000_000,
              "escrow::resolve_dispute":  5_000_000,
              "token::mint":              3_000_000,
              "token::transfer":          3_000_000,
              "token::approve_and_transfer_from": 4_000_000,
              "token::burn":              3_000_000,
          }

          with open("bench_output.txt") as f:
              text = f.read()

          failures = []
          for bench, limit_ns in THRESHOLDS.items():
              # Match lines like:  escrow::fund   time:   [1.2345 ms  1.3456 ms  1.4567 ms]
              pattern = re.escape(bench) + r".*?time:.*?\[\s*([\d.]+)\s*(ns|µs|ms|s)"
              m = re.search(pattern, text, re.DOTALL)
              if not m:
                  print(f"WARNING: no result found for '{bench}', skipping threshold check")
                  continue
              value, unit = float(m.group(1)), m.group(2)
              multipliers = {"ns": 1, "µs": 1_000, "ms": 1_000_000, "s": 1_000_000_000}
              ns = value * multipliers[unit]
              status = "OK" if ns <= limit_ns else "FAIL"
              print(f"[{status}] {bench}: {ns:.0f} ns  (limit {limit_ns} ns)")
              if status == "FAIL":
                  failures.append(bench)

          if failures:
              print(f"\nGas regression detected for: {', '.join(failures)}")
              sys.exit(1)
          EOF
