name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --workspace --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Lint (includes JSDoc validation)
        run: npm run lint

      - name: Documentation coverage check
        run: npm run docs:check

      - name: Save documentation report
        if: always()
        run: npm run docs:report

      - name: Upload documentation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-report
          path: docs-report.json

      - name: Run tests with coverage
        run: node node_modules/vitest/vitest.mjs run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Build
        run: node node_modules/vite/bin/vite.js build
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  deny:
    name: License and Duplicate Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build all contracts
        run: |
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "Building $(basename $dir)..."
              stellar contract build --manifest-path "$dir/Cargo.toml"
            fi
          done

      - name: Check WASM sizes
        run: |
          MAX=65536
          FAILED=0
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            size=$(wc -c < "$wasm")
            echo "$(basename $wasm): $size bytes"
            if [ "$size" -gt "$MAX" ]; then
              echo "ERROR: $(basename $wasm) exceeds $MAX bytes ($size)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
