name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --workspace --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  list-contracts:
    name: List contracts
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.list-contracts.outputs.contracts }}
    steps:
      - uses: actions/checkout@v4
      - id: list-contracts
        name: List contracts
        run: echo "contracts=$(ls -d contracts/*/ | xargs -n 1 basename | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT

  test:
    name: Tests (${{ matrix.contract }})
    needs: [list-contracts]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        contract: ${{ fromJson(needs.list-contracts.outputs.contracts) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -p ${{ matrix.contract }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: cargo test -p soroban-integration-tests

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Generate coverage summary
        id: coverage
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --json | jq '.data[0].summary.percent_covered')
          echo "percent=${COVERAGE}" >> "$GITHUB_OUTPUT"
          echo "Code coverage: ${COVERAGE}%"

      - name: Check coverage threshold
        run: |
          COVERAGE="${{ steps.coverage.outputs.percent }}"
          THRESHOLD=80
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "ERROR: Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Compute base branch coverage delta
        if: github.event_name == 'pull_request'
        id: base_coverage
        continue-on-error: true
        run: |
          git fetch origin "${{ github.base_ref }}"
          git checkout "origin/${{ github.base_ref }}"
          BASE=$(cargo llvm-cov --workspace --json | jq '.data[0].summary.percent_covered')
          echo "percent=${BASE}" >> "$GITHUB_OUTPUT"
          git checkout "${{ github.sha }}"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const current = parseFloat('${{ steps.coverage.outputs.percent }}');
            const baseRaw = '${{ steps.base_coverage.outputs.percent }}';
            const base = baseRaw ? parseFloat(baseRaw) : null;
            const delta = base !== null ? (current - base).toFixed(2) : null;
            const deltaStr = delta !== null
              ? (parseFloat(delta) >= 0 ? `+${delta}` : delta)
              : 'n/a';
            const threshold = 80;
            const status = current >= threshold ? '✅' : '❌';
            const body = [
              '## Code Coverage Report',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Line coverage | **${current.toFixed(2)}%** ${status} |`,
              `| Threshold | ${threshold}% |`,
              `| Delta vs \`${{ github.base_ref }}\` | ${deltaStr}% |`,
              '',
              `Minimum line coverage of ${threshold}% is ${current >= threshold ? 'met' : '**not met**'}.`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- coverage-report -->';
            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
        with:
          files: ./lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 30

  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests on token and escrow
        run: |
          cargo mutants --config mutants.toml --baseline skip --no-times --no-shuffle \
            -p soroban-token-template -p soroban-escrow-template \
            -o mutants.out
          if [ -f mutants.out/outcomes.json ]; then
            OUTCOMES=mutants.out/outcomes.json
          elif [ -f mutants.out/mutants.out/outcomes.json ]; then
            OUTCOMES=mutants.out/mutants.out/outcomes.json
          elif [ -f mutants.out/outcomes.jsonl ]; then
            OUTCOMES=mutants.out/outcomes.jsonl
          else
            OUTCOMES=mutants.out/mutants.out/outcomes.jsonl
          fi
          if [[ "$OUTCOMES" == *.jsonl ]]; then
            SURVIVORS=$(grep -c '"status": "missed"' "$OUTCOMES" 2>/dev/null || echo 0)
          else
            SURVIVORS=$(jq '[.outcomes[]? // .[]? | select(.status == "missed")] | length' "$OUTCOMES")
          fi
          echo "Surviving mutants: ${SURVIVORS}"
          if [ "$SURVIVORS" -gt 0 ]; then
            echo "ERROR: ${SURVIVORS} surviving mutant(s) in critical paths"
            cat mutants.out/outcomes.jsonl 2>/dev/null | jq 'select(.status == "missed")' || true
            exit 1
          fi

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutants.out/
          retention-days: 30

  deny:
    name: License and Duplicate Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2

  audit:
    name: WASM Build and Check
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build all contracts
        run: |
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "Building $(basename $dir)..."
              stellar contract build --manifest-path "$dir/Cargo.toml"
            fi
          done

      - name: Check WASM sizes
        run: |
          pip install jq
          python3 .github/scripts/check_wasm_sizes.py .github/wasm_sizes.json 1.05

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  datakey-discriminants:
    name: DataKey Discriminant Stability (${{ matrix.contract }})
    runs-on: ubuntu-latest
    needs: [list-contracts]
    strategy:
      fail-fast: false
      matrix:
        contract: ${{ fromJson(needs.list-contracts.outputs.contracts) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check DataKey discriminants
        run: cargo test -p ${{ matrix.contract }} -- discriminant_tests --nocapture

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --deny warnings
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        run: cargo audit --deny warnings

  machete:
    name: Unused dependencies (cargo-machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Check for unused dependencies
        run: cargo machete --workspace

  udeps:
    name: Unused dev-dependencies (cargo-udeps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused dev-dependencies
        run: cargo +nightly udeps --workspace --all-targets

  semver:
    name: Semver Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check soroban-token-template for breaking changes
        run: cargo semver-checks -p soroban-token-template

      - name: Check soroban-escrow-template for breaking changes
        run: cargo semver-checks -p soroban-escrow-template

  smoke-test:
    name: Smoke Test (local node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fmt, clippy, test]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build contracts
        run: |
          for dir in contracts/*/; do
            [ -f "$dir/Cargo.toml" ] && stellar contract build --manifest-path "$dir/Cargo.toml"
          done

      - name: Start local Stellar node
        run: docker compose -f docker/docker-compose.yml up -d stellar-node

      - name: Wait for Stellar node to be ready
        run: |
          echo "Waiting for local Stellar node..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/ && { echo "Node ready after $((i * 5))s"; break; }
            [ "$i" -eq 30 ] && { echo "ERROR: node not ready after 150s"; exit 1; }
            sleep 5
          done

      - name: Configure Stellar identity and fund account
        run: |
          stellar keys generate --global default --network local
          ADDR=$(stellar keys address default)
          echo "Funding $ADDR via Friendbot..."
          curl -sSf "http://localhost:8000/friendbot?addr=${ADDR}" > /dev/null || \
            curl -sSf "http://localhost:8001/friendbot?addr=${ADDR}" > /dev/null

      - name: Deploy contracts to local node
        run: ./scripts/deploy.sh local

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh local

      - name: Stop local Stellar node
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
        run: cargo audit --deny warnings
  nightly:
    name: Nightly Build
    runs-on: ubuntu-latest
    schedule:
      - cron: '0 0 * * 0' # Runs every Sunday at midnight
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Compile all contracts
        run: cargo build --workspace --all-targets
      - name: Test all contracts
        run: cargo test --workspace --all-targets
      - name: Report failure
        if: ${{ failure() }}
        uses: actions/create-issue@v2
        with:
          title: "Nightly build failed"
          body: "The nightly build failed. Please investigate."
          labels: "bug"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
