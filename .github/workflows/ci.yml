name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --workspace --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests (${{ matrix.package }} / ${{ matrix.features || 'no features' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # token feature combinations
          - package: soroban-token-template
            features: ""
          - package: soroban-token-template
            features: pausable
          - package: soroban-token-template
            features: upgradeable
          - package: soroban-token-template
            features: capped-supply
          - package: soroban-token-template
            features: pausable,upgradeable,capped-supply,freeze
          # escrow feature combinations
          - package: soroban-escrow-template
            features: ""
          - package: soroban-escrow-template
            features: pausable
          - package: soroban-escrow-template
            features: upgradeable
          - package: soroban-escrow-template
            features: pausable,upgradeable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run tests
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test -p ${{ matrix.package }} --features ${{ matrix.features }}
          else
            cargo test -p ${{ matrix.package }}
          fi

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --json | jq '.data[0].summary.percent_covered')
          THRESHOLD=80
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "ERROR: Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
        with:
          files: ./lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 30

  deny:
    name: License and Duplicate Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2

  audit:
    name: WASM Build and Check
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build all contracts
        run: |
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "Building $(basename $dir)..."
              stellar contract build --manifest-path "$dir/Cargo.toml"
            fi
          done

      - name: Check WASM sizes
        run: |
          # 200 KB: optimized Soroban contracts typically range 20–100 KB;
          # 200 KB gives headroom for feature-rich contracts while still
          # catching runaway bloat before it reaches production.
          MAX=204800
          FAILED=0
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            size=$(wc -c < "$wasm")
            echo "$(basename $wasm): $size bytes"
            if [ "$size" -gt "$MAX" ]; then
              echo "ERROR: $(basename $wasm) exceeds $MAX bytes ($size)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  datakey-discriminants:
    name: DataKey Discriminant Stability
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check token DataKey discriminants
        run: cargo test -p soroban-token-template -- discriminant_tests --nocapture

      - name: Check escrow DataKey discriminants
        run: cargo test -p soroban-escrow-template -- discriminant_tests --nocapture

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  machete:
    name: Unused dependencies (cargo-machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Check for unused dependencies
        run: cargo machete --workspace

  udeps:
    name: Unused dev-dependencies (cargo-udeps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused dev-dependencies
        run: cargo +nightly udeps --workspace --all-targets

  smoke-test:
    name: Smoke Test (local node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fmt, clippy, test]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build contracts
        run: |
          for dir in contracts/*/; do
            [ -f "$dir/Cargo.toml" ] && stellar contract build --manifest-path "$dir/Cargo.toml"
          done

      - name: Start local Stellar node
        run: docker compose -f docker/docker-compose.yml up -d stellar-node

      - name: Wait for Stellar node to be ready
        run: |
          echo "Waiting for local Stellar node..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/ && { echo "Node ready after $((i * 5))s"; break; }
            [ "$i" -eq 30 ] && { echo "ERROR: node not ready after 150s"; exit 1; }
            sleep 5
          done

      - name: Configure Stellar identity and fund account
        run: |
          stellar keys generate --global default --network local
          ADDR=$(stellar keys address default)
          echo "Funding $ADDR via Friendbot..."
          curl -sSf "http://localhost:8000/friendbot?addr=${ADDR}" > /dev/null || \
            curl -sSf "http://localhost:8001/friendbot?addr=${ADDR}" > /dev/null

      - name: Deploy contracts to local node
        run: ./scripts/deploy.sh local

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh local

      - name: Stop local Stellar node
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
